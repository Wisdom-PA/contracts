openapi: 3.0.3
info:
  title: Cube ↔ App API
  description: |
    REST API between the on-device cube and the mobile companion app.
    Used over LAN (Wi‑Fi) or tunnel after Bluetooth pairing. All communication encrypted (TLS or app-layer).
  version: 0.1.0
  contact:
    name: Wisdom

servers:
  - url: http://cube.local
    description: Cube on local network (replace with actual host/port in app)
  - url: http://localhost:8080
    description: Local dev / stub

paths:
  /status:
    get:
      summary: Cube status and version
      operationId: getStatus
      tags: [status]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '503':
          description: Cube not ready

  /config:
    get:
      summary: Get device config (name, default privacy mode, etc.)
      operationId: getConfig
      tags: [config]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceConfig'
    patch:
      summary: Update device config (partial)
      operationId: patchConfig
      tags: [config]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceConfigPatch'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceConfig'
        '400':
          description: Invalid payload

  /devices:
    get:
      summary: List discovered devices (lights, etc.)
      operationId: listDevices
      tags: [devices]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceList'
  /devices/discover:
    post:
      summary: Run device discovery (stub may complete immediately with no new devices)
      operationId: discoverDevices
      tags: [devices]
      responses:
        '200':
          description: Discovery finished (synchronous stub returns current list)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDiscoverResponse'
        '405':
          description: Method not allowed
  /devices/{deviceId}:
    patch:
      summary: Partial update of device state (e.g. light power, brightness)
      operationId: patchDevice
      tags: [devices]
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceStatePatch'
      responses:
        '200':
          description: Updated device summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceSummary'
        '400':
          description: Invalid payload
        '404':
          description: Unknown device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceErrorResponse'
        '503':
          description: Device unreachable (integration / health)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceErrorResponse'
  /chat:
    post:
      summary: Text message to on-device assistant (app satellite client)
      operationId: sendChat
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessage'
      responses:
        '200':
          description: Assistant reply
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatReply'
  /internet-activity:
    get:
      summary: List recent external (internet) calls for transparency UI
      operationId: listInternetActivity
      tags: [transparency]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternetActivityList'
  /routines/history:
    get:
      summary: Recent scheduled routine executions (inspection)
      operationId: listRoutineRunHistory
      tags: [routines]
      parameters:
        - name: limit
          in: query
          description: Max number of runs to return (newest first)
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineRunHistory'
        '405':
          description: Method not allowed
  /routines/{routineId}:
    patch:
      summary: Update routine metadata (display name)
      operationId: patchRoutine
      tags: [routines]
      parameters:
        - name: routineId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoutinePatch'
      responses:
        '200':
          description: Updated routine summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineSummary'
        '400':
          description: Invalid body (e.g. missing name)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Unknown routine id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '501':
          description: Catalog does not support edits (read-only fixture)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          description: Method not allowed
  /routines:
    get:
      summary: List routines
      operationId: listRoutines
      tags: [routines]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineList'
  /profiles:
    get:
      summary: List profiles (adult, guest, child)
      operationId: listProfiles
      tags: [profiles]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileList'
  /logs:
    get:
      summary: Query behaviour log (chain summaries, intents, actions)
      operationId: queryLogs
      tags: [logs]
      parameters:
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogQueryResult'
  /backup:
    post:
      summary: Generate backup bundle (routines, devices, profiles, config)
      operationId: createBackup
      tags: [backup]
      responses:
        '200':
          description: Backup payload (opaque blob or JSON per backup format)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '503':
          description: Cube busy or not ready
  /restore:
    post:
      summary: Restore from backup payload
      operationId: restoreBackup
      tags: [backup]
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Restore accepted
        '400':
          description: Invalid backup
        '409':
          description: Conflict (version/merge)

components:
  schemas:
    Status:
      type: object
      required: [version, ready]
      properties:
        version:
          type: string
          example: "0.1.0"
        ready:
          type: boolean
        privacy_mode:
          type: string
          enum: [paranoid, normal]
        global_offline:
          type: boolean
          description: When true, cube blocks outbound internet (Plan global offline mode).

    DeviceConfig:
      type: object
      properties:
        device_name:
          type: string
        default_privacy_mode:
          type: string
          enum: [paranoid, normal]
        global_offline:
          type: boolean

    DeviceConfigPatch:
      type: object
      properties:
        device_name:
          type: string
        default_privacy_mode:
          type: string
          enum: [paranoid, normal]
        global_offline:
          type: boolean

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    DeviceErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ApiError'

    DeviceDiscoverResponse:
      type: object
      required: [status, added, devices]
      properties:
        status:
          type: string
          enum: [complete]
        added:
          type: integer
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceSummary'

    DeviceList:
      type: object
      properties:
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceSummary'

    DeviceSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        room:
          type: string
        power:
          type: boolean
          description: For lights and similar on/off devices
        brightness:
          type: number
          description: Normalized brightness 0.0–1.0 when dimmable
        reachable:
          type: boolean
          description: When false, state-changing requests should fail until discovery/health recovers the device (F6.T3)

    DeviceStatePatch:
      type: object
      properties:
        power:
          type: boolean
        brightness:
          type: number

    ChatMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ChatReply:
      type: object
      required: [reply, source]
      properties:
        reply:
          type: string
        source:
          type: string
          enum: [on_device, online]

    InternetActivityEvent:
      type: object
      properties:
        id:
          type: string
        at:
          type: string
          format: date-time
        service_category:
          type: string
        summary:
          type: string
        profile_display_name:
          type: string

    InternetActivityList:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/InternetActivityEvent'

    RoutineList:
      type: object
      properties:
        routines:
          type: array
          items:
            $ref: '#/components/schemas/RoutineSummary'

    RoutineSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    RoutinePatch:
      type: object
      properties:
        name:
          type: string
          description: New display name for the routine

    RoutineRunStep:
      type: object
      required: [index, kind, summary, ok]
      properties:
        index:
          type: integer
        kind:
          type: string
        summary:
          type: string
        ok:
          type: boolean
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true

    RoutineRunEntry:
      type: object
      required: [run_id, at, routine_id, routine_name, ok, steps]
      properties:
        run_id:
          type: string
          format: uuid
        at:
          type: string
          format: date-time
        routine_id:
          type: string
        routine_name:
          type: string
        ok:
          type: boolean
        steps:
          type: array
          items:
            $ref: '#/components/schemas/RoutineRunStep'

    RoutineRunHistory:
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items:
            $ref: '#/components/schemas/RoutineRunEntry'

    ProfileList:
      type: object
      properties:
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/ProfileSummary'

    ProfileSummary:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum: [adult, guest, child]
        display_name:
          type: string

    LogQueryResult:
      type: object
      properties:
        chains:
          type: array
          items:
            type: object

tags:
  - name: status
  - name: config
  - name: devices
  - name: routines
  - name: profiles
  - name: logs
  - name: backup
  - name: chat
  - name: transparency
